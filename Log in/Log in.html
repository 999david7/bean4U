<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <title>Beans4U – Login</title>

    <!-- Bootstrap 5 -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <!-- Custom Styles -->
    <link rel="stylesheet" href="log-in.css" />
</head>

<body>
<div class="bg-cover" aria-hidden="true"></div>

<div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
</div>

<div class="noise" aria-hidden="true"></div>

<!-- Home button -->
<a class="homeBtn" href="../index.html" aria-label="Back to Home">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
    </svg>
</a>

<main class="container min-vh-100 d-flex align-items-center justify-content-center">
    <section class="login-container glass">
        <form class="login-form" action="/backend/login.php" method="POST">
            <h2 class="mb-3">Log In</h2>

            <div class="mb-3">
                <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Email"
                        required
                        autocomplete="email"
                />
            </div>

            <div class="mb-4">
                <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Password"
                        required
                        autocomplete="current-password"
                />
            </div>

            <button type="submit" class="btn btn-login w-100">Log In</button>

            <p class="text-center mt-3 mb-0 small">
                Don't have an account?
                <a href="register.html" class="register-link">Register here</a>
            </p>

            <p class="text-center mt-3 mb-0 tinyFooter">
                © <span id="year"></span> bean4U
            </p>
        </form>
    </section>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Page Script -->
<script src="log-in.js"></script>
</body>
</html>
