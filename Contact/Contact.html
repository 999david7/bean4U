<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Us | bean4U</title>

    <!-- Bootstrap 5 -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <!-- Google Font -->
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
            rel="stylesheet"
    />

    <!-- Custom Styles -->
    <link rel="stylesheet" href="contact.css" />
</head>

<body>

<main class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <section class="card-glass w-100">
        <h1 class="mb-2">☕ Get in touch</h1>

        <p class="subtitle mb-4">
            Have a question or just want to chat over a virtual coffee?
            Drop us a message and we’ll get back within a day!
        </p>

        <form action="/your-endpoint" method="POST" class="contact-form">

            <div class="row g-3">
                <div class="col-md-6">
                    <label for="name" class="form-label">Name</label>
                    <input
                            id="name"
                            name="name"
                            type="text"
                            class="form-control"
                            placeholder="John Doe"
                            required
                    />
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input
                            id="email"
                            name="email"
                            type="email"
                            class="form-control"
                            placeholder="john@email.com"
                            required
                    />
                </div>
            </div>

            <div class="mt-3">
                <label for="subject" class="form-label">Subject</label>
                <input
                        id="subject"
                        name="subject"
                        type="text"
                        class="form-control"
                        placeholder="What's on your mind?"
                />
            </div>

            <div class="mt-3">
                <label for="message" class="form-label">Message</label>
                <textarea
                        id="message"
                        name="message"
                        rows="6"
                        class="form-control"
                        placeholder="Type your message here…"
                        required
                ></textarea>
            </div>

            <div class="mt-4 text-center">
                <button type="submit" class="btn btn-coffee btn-lg">
                    Send Message
                </button>
            </div>

        </form>
    </section>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Global Script -->
<script src="../Contact/contact.js"></script>

<!-- Chatbase -->
<script>
    (function(){
        if(!window.chatbase||window.chatbase("getState")!=="initialized"){
            window.chatbase=(...arguments)=>{
                if(!window.chatbase.q){window.chatbase.q=[]}
                window.chatbase.q.push(arguments)
            };
            window.chatbase=new Proxy(window.chatbase,{
                get(target,prop){
                    if(prop==="q"){return target.q}
                    return(...args)=>target(prop,...args)
                }
            })
        }
        const onLoad=function(){
            const script=document.createElement("script");
            script.src="https://www.chatbase.co/embed.min.js";
            script.id="N666eT2Bupz8nsHBiiJux";
            script.domain="www.chatbase.co";
            document.body.appendChild(script)
        };
        if(document.readyState==="complete"){onLoad()}
        else{window.addEventListener("load",onLoad)}
    })();
</script>

</body>
</html>
