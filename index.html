<!DOCTYPE html>

    <!-- Move chat bubble to left -->
    <style>
        #chatbase-bubble {
            right: auto !important;
            left: 20px !important;
            bottom: 20px !important;

    </style>

<link rel="icon" href="../imgs/logo/ChatGPT Image 28. Sept. 2025, 21_49_00.ico">
<body>
<div class="bg-cover" aria-hidden="true"></div>

<div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
</div>

<div class="noise" aria-hidden="true"></div>

<a href="marketplace/marketplace.html" class="get-bean-btn">
    ☕ Get your bean
</a>

<main class="page">
    <header class="hero">
        <div class="heroTop">
            <h1 class="headline">bean4U</h1>
            <p class="slogan">your coffee your choice</p>
        </div>

        <!-- Icon -> fold-out search -->
        <div class="searchDock" id="searchDock">
            <button
                    class="searchIconBtn"
                    id="searchToggle"
                    type="button"
                    aria-label="Search recipes"
                    aria-expanded="false"
            >
                <svg
                        class="searchIcon"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                        focusable="false"
                >
                    <path
                            d="M10.5 18a7.5 7.5 0 1 1 0-15a7.5 7.5 0 0 1 0 15Zm6.2-1.3l3.2 3.2"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                    />
                </svg>
            </button>

            <form class="searchForm" id="recipeSearch" autocomplete="off">
                <label class="srOnly" for="recipeQuery">Search recipes</label>
                <input
                        id="recipeQuery"
                        class="searchInput"
                        type="search"
                        placeholder="Search recipes…"
                />
            </form>
        </div>

        <nav class="menu-container" aria-label="Primary">
            <span class="menuHoverPill" aria-hidden="true"></span>

            <ul class="menu-list">
                <li>
                    <a href="Rezepte (2)/Rezepte2.html" data-pill="recipes">Recipes</a>
                </li>
                <li><a href="About/About.html" data-pill="about">About</a></li>
                <li>
                    <a href="Services/Services.html" data-pill="recommendation">
                        Our recommendation
                    </a>
                </li>
                <li><a href="auth/Log%20in.html" data-pill="login">Log in</a></li>
                <li><a href="Contact/Contact.html" data-pill="contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <footer class="footer">
        <span>© <span id="year"></span> bean4U</span>
        <span class="footerDot">•</span>
        <span>Dark roast. Smooth UI.</span>
        <span class="footerDot">•</span>
        <a class="footerLink" href="terms.html">Terms</a>
        <span class="footerDot">•</span>
        <a class="footerLink" href="privacy.html">Privacy</a>
    </footer>
</main>

<script src="script.js"></script>

<!-- Chatbase -->
<script>
    (function () {
        if (!window.chatbase || window.chatbase("getState") !== "initialized") {
            window.chatbase = (...arguments) => {
                if (!window.chatbase.q) window.chatbase.q = [];
                window.chatbase.q.push(arguments);
            };
            window.chatbase = new Proxy(window.chatbase, {
                get(target, prop) {
                    if (prop === "q") return target.q;
                    return (...args) => target(prop, ...args);
                },
            });
        }
        const onLoad = function () {
            const script = document.createElement("script");
            script.src = "https://www.chatbase.co/embed.min.js";
            script.id = "N666eT2Bupz8nsHBiiJux";
            script.domain = "www.chatbase.co";
            document.body.appendChild(script);
        };
        if (document.readyState === "complete") onLoad();
        else window.addEventListener("load", onLoad);
    })();
</script>
</body>
</html>
